-- Conky, a system monitor https://github.com/brndnmtthws/conky
--
-- This configuration file is Lua code. You can write code in here, and it will
-- execute when Conky loads. You can use it to generate your own advanced
-- configurations.
--
-- Try this (remove the `--`):
--
--   print("Loading Conky config")
--
-- For more on Lua, see:
-- https://www.lua.org/pil/contents.html

conky.config = {
    alignment = 'top_right',
    background = false,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = 'red',
    default_outline_color = 'white',
    default_shade_color = 'white',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'DejaVu Sans Mono:size=10',
    gap_x = 15,
    gap_y = 15,
    minimum_height = 5,
    minimum_width = 5,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'desktop',
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 1.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,

    -- Enable ARGB transparency
    own_window_argb_visual = true,
    own_window_argb_value = 150,

    -- Optional: keep Conky below other windows nicely
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
}

conky.text = [[
${alignc}${font Droid Sans Mono: pixelsize=40}${time %I:%M}${font}
${voffset 5}${alignc}${font Droid Sans Mono: pixelsize=15}${time %A %d %B %Y}${font}

SYSTEM $hr
${color grey}Linux Kernel:${color} $kernel
${color grey}OS:${color} ${exec lsb_release -d | cut -f2}
${color grey}DE:${color}${exec echo $XDG_CURRENT_DESKTOP}
${color grey}Uptime:${color} $uptime
${color grey}CPU Temp:${color} ${exec sensors | grep -E 'Tdie|Tctl' | head -n1 | awk '{print $2}'}

RESOURCES $hr
${color grey}CPU${color}: $freq_g GHz
 ${cpu}%${cpubar}
${alignc}${cpugraph 60,310 grey ff0000 -t}
${color grey}RAM:${color} ${mem} / ${memmax}
 ${memperc}% $membar
${alignc}${memgraph 60,310 ff0000 -t}
${color grey}File systems:${color}
 ${color grey}/         ${color red}${fs_used /} / ${fs_size /}
${fs_bar /}
 ${color grey}/home      ${color red}${fs_used /home} / ${fs_size /home}
${fs_bar /home}

${color grey}Network:${color}
${voffset 5}${template1}${downspeedf enp0s31f6} kB/s ${goto 125}${template0} ${upspeedf enp0s31f6} kB/s
${downspeedgraph enp0s31f6 60,120 7fff00 ff0000 -t} ${upspeedgraph enp0s31f6 60,120 7fff00 ff0000 -t}

${color grey}Info:$color ${scroll 32 Conky $conky_version - $sysname $nodename $kernel $machine}
${color grey}Processes:$color $processes  ${color grey}Running:$color $running_processes
$hr
${color grey}Name              PID     CPU%   MEM%
${color lightgrey} ${top name 1} ${top pid 1} ${top cpu 1} ${top mem 1}
${color lightgrey} ${top name 2} ${top pid 2} ${top cpu 2} ${top mem 2}
${color lightgrey} ${top name 3} ${top pid 3} ${top cpu 3} ${top mem 3}
${color lightgrey} ${top name 4} ${top pid 4} ${top cpu 4} ${top mem 4}
${color lightgrey} ${top name 5} ${top pid 5} ${top cpu 5} ${top mem 5}

]]